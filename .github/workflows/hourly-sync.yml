name: Hourly Sync

on:
  # 定时触发：每小时的第 0 分钟执行（UTC 时间）
  schedule:
    - cron: '0 * * * *'
  # 允许在 GitHub 网页端手动点击运行，方便测试
  workflow_dispatch: 

# 核心：必须添加写入权限，允许 Action 修改仓库里的文件
permissions:
  contents: write 

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      # 第一步：检出当前仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 第二步：执行你原有的 API 触发请求
      - name: Trigger Hourly Sync API
        run: |
          curl -s -X POST "https://deploy-to-surf-database-9e8837.surf.computer/api/sync/collectibles" \
          -u "${{ secrets.SURF_AUTH_TOKEN }}"

      # 第三步：记录当前广州时间并推送到仓库
      - name: Record time and push to repo
        run: |
          # 强制设置时区为东八区
          export TZ="Asia/Shanghai"
          CURRENT_TIME=$(date "+%Y-%m-%d %H:%M:%S")
          
          # 将最新运行时间追加到 Markdown 日志文件中（- 代表 Markdown 列表符号）
          echo "- [Hourly Sync] Latest run: $CURRENT_TIME (UTC+8)" >> sync_history.md
          
          # 配置 Git 机器人信息并提交代码
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add sync_history.md
          # || true 能够防止短时间内重复运行由于内容没变导致 commit 报错
          git commit -m "chore: record hourly sync at $CURRENT_TIME" || true
          git push
