name: Hourly Sync

on:
  # 定时触发：每小时的第 0 分钟执行
  schedule:
    - cron: '0 * * * *'
  # 允许在 GitHub 网页端手动点击运行，方便测试
  workflow_dispatch: 

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Hourly Sync API
        run: |
          curl -s -X POST "https://deploy-to-surf-database-9e8837.surf.computer/api/sync/collectibles" \
          -u "${{ secrets.SURF_AUTH_TOKEN }}"
