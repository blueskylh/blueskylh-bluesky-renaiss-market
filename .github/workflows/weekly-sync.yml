name: Weekly Combined Sync

on:
  # 定时触发：UTC 时间每周日 16:00（对应东八区每周一 00:00）
  schedule:
    - cron: '0 16 * * 0'
  workflow_dispatch: 

# 核心：必须添加写入权限，允许 Action 修改仓库里的文件
permissions:
  contents: write 

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      # 第一步：检出当前仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 第二步：执行你原有的 API 触发请求
      - name: Trigger Weekly Sync API
        run: |
          curl -s -X POST "https://deploy-to-surf-database-9e8837.surf.computer/api/combined/sync-all?limit=3000&concurrency=20" \
          -u "${{ secrets.SURF_AUTH_TOKEN }}"

      # 第三步：记录当前广州时间并推送到仓库
      - name: Record time and push to repo
        run: |
          # 强制设置时区为东八区
          export TZ="Asia/Shanghai"
          CURRENT_TIME=$(date "+%Y-%m-%d %H:%M:%S")
          
          # 追加写入到同一个 Markdown 日志文件中
          echo "- [Weekly Combined Sync] Latest run: $CURRENT_TIME (UTC+8)" >> sync_history.md
          
          # 配置 Git 机器人信息并提交代码
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add sync_history.md
          git commit -m "chore: record weekly combined sync at $CURRENT_TIME" || true
          git push
